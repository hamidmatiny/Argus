# buf.yaml — lint and breaking-change policy for ARGUS protos
version: v2
modules:
  - path: .
    name: buf.build/argus-platform/argus
lint:
  use:
    - STANDARD
  except:
    # Allow *_UNSPECIFIED = 0 (STANDARD already prefers this; kept explicit)
    - PACKAGE_VERSION_SUFFIX
breaking:
  use:
    - FILE
