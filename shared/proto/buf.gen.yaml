# buf.gen.yaml — generate Go/Python stubs + grpc-gateway + OpenAPI
version: v2
# Keep clean false so shared/gen/go/go.mod (module root) is not deleted.
clean: false
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.5
    out: ../gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: ../gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/grpc-ecosystem/gateway:v2.24.0
    out: ../gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=true

  - remote: buf.build/grpc-ecosystem/openapiv2:v2.24.0
    out: ../gen/openapi

  - remote: buf.build/protocolbuffers/python:v29.3
    out: ../gen/python

  - remote: buf.build/grpc/python:v1.69.0
    out: ../gen/python

  - remote: buf.build/community/danielgtaylor-betterproto:v1.2.5
    out: ../gen/python/betterproto
