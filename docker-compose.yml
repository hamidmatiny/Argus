# ARGUS local development stack
# Phase 0: Redpanda (Kafka-API compatible).
# Phase 1: Schema Registry (built into Redpanda) + Redpanda Console.

name: argus

services:
  # ---------------------------------------------------------------------------
  # Messaging — Redpanda (Kafka API, no ZooKeeper)
  # Built-in Confluent-compatible Schema Registry on :8081 (host :18081)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: argus-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092" # Kafka API (host)
      - "18081:18081" # Schema Registry (Confluent-compatible)
      - "18082:18082" # Pandaproxy (HTTP proxy)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy.*true'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  # ---------------------------------------------------------------------------
  # Phase 1 — Redpanda Console (UI for topics + Schema Registry subjects)
  # Schema Registry URL points at Redpanda's built-in SR (not a separate Karapace).
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.5
    container_name: argus-redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8087:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Phase 2 — ingestion (simulator + Ray consumer)
  # Resource limits mirror the 2 CPU / 2Gi pattern used in source fleet services.
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: .
      dockerfile: ingestion/simulator/Dockerfile
    container_name: argus-simulator
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      SIMULATOR_TOPIC: telemetry.raw
      # Prefer >=12 vehicles so per-feature aggregates are stable enough for
      # drift-monitor's frozen live baseline (5 independent random-walks wander).
      SIMULATOR_VEHICLES: ${SIMULATOR_VEHICLES:-12}
      SIMULATOR_RATE: ${SIMULATOR_RATE:-10}
      SIMULATOR_DURATION: ${SIMULATOR_DURATION:-0}
      SIMULATOR_FAILURE_RATE: ${SIMULATOR_FAILURE_RATE:-0.05}
      SIMULATOR_HEALTH_PORT: "8091"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ARGUS_AVRO_SCHEMA_PATH: /app/shared/avro/telemetry_event.avsc
    ports:
      - "8091:8091"
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8091/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  ray-consumer:
    build:
      context: .
      dockerfile: ingestion/ray_consumer/Dockerfile
    container_name: argus-ray-consumer
    # Ray object store is backed by /dev/shm; Docker's default 64MB shm is too small.
    shm_size: "1gb"
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      INGESTION_RAW_TOPIC: telemetry.raw
      INGESTION_NORMALIZED_TOPIC: telemetry.normalized
      INGESTION_QUARANTINE_TOPIC: telemetry.quarantine
      INGESTION_KAFKA_GROUP_ID: argus-ingestion
      # 2 actors fits a 2Gi cgroup; raise with memory if you scale partitions.
      RAY_NUM_PARTITIONS: ${RAY_NUM_PARTITIONS:-2}
      RAY_NUM_CPUS: ${RAY_NUM_CPUS:-2}
      RAY_BATCH_SIZE: ${RAY_BATCH_SIZE:-50}
      # Explicit budgets — do not rely on Ray auto-detection under cgroup limits.
      RAY_OBJECT_STORE_MEMORY_BYTES: ${RAY_OBJECT_STORE_MEMORY_BYTES:-268435456}
      RAY_MEMORY_BYTES: ${RAY_MEMORY_BYTES:-536870912}
      # Dashboard multi-process UI exceeds 2Gi alone; enable only with more memory.
      RAY_INCLUDE_DASHBOARD: ${RAY_INCLUDE_DASHBOARD:-false}
      RAY_HEALTH_PORT: "8092"
      RAY_DASHBOARD_HOST: "0.0.0.0"
      RAY_DASHBOARD_PORT: "8265"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ARGUS_AVRO_SCHEMA_PATH: /app/shared/avro/telemetry_event.avsc
    ports:
      - "8092:8092"
      - "8265:8265"
    depends_on:
      redpanda:
        condition: service_healthy
      simulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8092/health"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 3 — Flink cluster (JobManager + TaskManager) for PyFlink QA jobs
  # UI on host :8088 (container :8081). Brokers reachable as redpanda:9092.
  # ---------------------------------------------------------------------------
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: argus-flink-jobmanager
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        execution.checkpointing.interval: 10s
    ports:
      - "8088:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/config"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      redpanda:
        condition: service_healthy

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: argus-flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Phase 3 — stream-processor QA gate (local engine by default; Flink optional)
  # ---------------------------------------------------------------------------
  stream-processor:
    build:
      context: .
      dockerfile: stream-processor/Dockerfile
    container_name: argus-stream-processor
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      QA_ENGINE: ${QA_ENGINE:-local}
      QA_SOURCE_TOPIC: telemetry.normalized
      QA_VALIDATED_TOPIC: telemetry.validated
      QA_QUARANTINE_TOPIC: telemetry.quarantine
      QA_METRICS_TOPIC: telemetry.qa_metrics
      QA_KAFKA_GROUP_ID: argus-stream-processor
      QA_WINDOW_EVENTS: ${QA_WINDOW_EVENTS:-20}
      QA_QUARANTINE_RATE_THRESHOLD: ${QA_QUARANTINE_RATE_THRESHOLD:-0.15}
      QA_HEALTH_PORT: "8093"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ARGUS_AVRO_SCHEMA_PATH: /app/shared/avro/telemetry_event.avsc
      FLINK_JOBMANAGER: flink-jobmanager:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: stream-processor
    ports:
      - "8093:8093"
    depends_on:
      redpanda:
        condition: service_healthy
      ray-consumer:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8093/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 5 — lakehouse (MinIO + Iceberg REST + Trino + writers)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: argus-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      default:
        aliases:
          - warehouse.minio
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: argus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-admin} $${MINIO_ROOT_PASSWORD:-password}; do sleep 1; done;
      mc mb --ignore-existing local/warehouse;
      mc anonymous set download local/warehouse;
      echo minio warehouse ready;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    restart: "no"

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: argus-iceberg-rest
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password}
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_CLIENT__REGION: us-east-1
    ports:
      - "8181:8181"
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  trino:
    image: trinodb/trino:455
    container_name: argus-trino
    ports:
      # Host 8089 — 8080 is commonly taken locally; container still listens on 8080.
      - "8089:8080"
    volumes:
      - ./lakehouse/catalog/trino/catalog:/etc/trino/catalog:ro
    depends_on:
      - iceberg-rest
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/info || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  lakehouse-writer:
    build:
      context: .
      dockerfile: lakehouse/Dockerfile
    container_name: argus-lakehouse-writer
    command: ["python", "/app/lakehouse/writer/main.py"]
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      LAKEHOUSE_VALIDATED_TOPIC: telemetry.validated
      LAKEHOUSE_WRITER_GROUP_ID: argus-lakehouse-writer
      ICEBERG_CATALOG_TYPE: rest
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      ICEBERG_NAMESPACE: fleet
      ICEBERG_TELEMETRY_TABLE: telemetry
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password}
      AWS_REGION: us-east-1
      S3_PATH_STYLE_ACCESS: "true"
      LAKEHOUSE_BATCH_SIZE: ${LAKEHOUSE_BATCH_SIZE:-50}
      LAKEHOUSE_FLUSH_INTERVAL_SEC: ${LAKEHOUSE_FLUSH_INTERVAL_SEC:-5}
      LAKEHOUSE_WRITER_HEALTH_PORT: "8096"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ARGUS_AVRO_SCHEMA_PATH: /app/shared/avro/telemetry_event.avsc
    ports:
      - "8096:8096"
    depends_on:
      redpanda:
        condition: service_healthy
      stream-processor:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8096/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  lakehouse-dlq-writer:
    build:
      context: .
      dockerfile: lakehouse/Dockerfile
    container_name: argus-lakehouse-dlq-writer
    command: ["python", "/app/lakehouse/dlq_writer/main.py"]
    environment:
      KAFKA_BROKERS: redpanda:9092
      LAKEHOUSE_QUARANTINE_TOPIC: telemetry.quarantine
      LAKEHOUSE_DLQ_GROUP_ID: argus-lakehouse-dlq-writer
      ICEBERG_CATALOG_TYPE: rest
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      ICEBERG_NAMESPACE: fleet
      ICEBERG_QUARANTINE_TABLE: quarantine
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password}
      AWS_REGION: us-east-1
      S3_PATH_STYLE_ACCESS: "true"
      LAKEHOUSE_BATCH_SIZE: ${LAKEHOUSE_BATCH_SIZE:-50}
      LAKEHOUSE_FLUSH_INTERVAL_SEC: ${LAKEHOUSE_FLUSH_INTERVAL_SEC:-5}
      LAKEHOUSE_DLQ_HEALTH_PORT: "8097"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8097:8097"
    depends_on:
      redpanda:
        condition: service_healthy
      stream-processor:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8097/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 6 — orchestration (Dagster + MLflow + Postgres)
  # ---------------------------------------------------------------------------
  postgres-mlops:
    image: postgres:16-alpine
    container_name: argus-postgres-mlops
    environment:
      POSTGRES_USER: ${POSTGRES_MLOPS_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_MLOPS_PASSWORD:-argus}
      POSTGRES_DB: ${POSTGRES_MLOPS_DB:-mlops}
    ports:
      - "5433:5432"
    volumes:
      - postgres-mlops-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d mlops"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: argus-mlflow
    user: root
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://argus:argus@postgres-mlops:5432/mlops
      - --default-artifact-root=/mlflow/artifacts
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
    ports:
      # Host 5002 — 5000/5001 often taken on macOS / other local tools.
      - "5002:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres-mlops:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    # Override image HEALTHCHECK (expects Dagster :3000).
    restart: unless-stopped

  dagster-webserver:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: argus-dagster-webserver
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
    environment:
      DAGSTER_HOME: /opt/dagster/app
      KAFKA_BROKERS: redpanda:9092
      ORCH_RETRAINING_TOPIC: orchestration.retraining_triggered
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-argus-retraining}
      ICEBERG_CATALOG_TYPE: rest
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password}
      AWS_REGION: us-east-1
      DRIFT_REPORTS_DIR: /opt/dagster/app/drift_reports
      ORCH_ARTIFACTS_DIR: /opt/dagster/app/artifacts
      FEAST_REPO_PATH: /opt/dagster/app/feature_store
      ORCH_RETRAIN_MAX_SCORE_THRESHOLD: ${ORCH_RETRAIN_MAX_SCORE_THRESHOLD:-0.5}
      ORCH_RETRAIN_MIN_DRIFTED_FEATURES: ${ORCH_RETRAIN_MIN_DRIFTED_FEATURES:-2}
    ports:
      - "3000:3000"
    volumes:
      - drift-reports-data:/opt/dagster/app/drift_reports
      - dagster-storage:/opt/dagster/storage
      - orchestration-artifacts:/opt/dagster/app/artifacts
    depends_on:
      mlflow:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/server_info"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: argus-dagster-daemon
    command: ["dagster-daemon", "run"]
    environment:
      DAGSTER_HOME: /opt/dagster/app
      KAFKA_BROKERS: redpanda:9092
      ORCH_RETRAINING_TOPIC: orchestration.retraining_triggered
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-argus-retraining}
      ICEBERG_CATALOG_TYPE: rest
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password}
      AWS_REGION: us-east-1
      DRIFT_REPORTS_DIR: /opt/dagster/app/drift_reports
      ORCH_ARTIFACTS_DIR: /opt/dagster/app/artifacts
      FEAST_REPO_PATH: /opt/dagster/app/feature_store
      ORCH_RETRAIN_MAX_SCORE_THRESHOLD: ${ORCH_RETRAIN_MAX_SCORE_THRESHOLD:-0.5}
      ORCH_RETRAIN_MIN_DRIFTED_FEATURES: ${ORCH_RETRAIN_MIN_DRIFTED_FEATURES:-2}
    volumes:
      - drift-reports-data:/opt/dagster/app/drift_reports
      - dagster-storage:/opt/dagster/storage
      - orchestration-artifacts:/opt/dagster/app/artifacts
    depends_on:
      dagster-webserver:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    # Override image HEALTHCHECK (expects Dagster webserver :3000). Daemon has
    # no HTTP port — process probe so `docker compose up --wait` can succeed.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if any(b'dagster-daemon' in pathlib.Path('/proc',p,'cmdline').read_bytes() for p in pathlib.Path('/proc').iterdir() if p.name.isdigit()) else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 4 — drift-monitor (KS + Evidently → incidents.raw)
  # ---------------------------------------------------------------------------
  drift-monitor:
    build:
      context: .
      dockerfile: drift-monitor/Dockerfile
    container_name: argus-drift-monitor
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      DRIFT_SOURCE_TOPIC: telemetry.validated
      DRIFT_INCIDENTS_TOPIC: incidents.raw
      # Bump group id when baseline semantics change so offsets restart cleanly.
      DRIFT_KAFKA_GROUP_ID: argus-drift-monitor-v4
      DRIFT_BASELINE_SAMPLES: ${DRIFT_BASELINE_SAMPLES:-200}
      DRIFT_BASELINE_WARMUP_SAMPLES: ${DRIFT_BASELINE_WARMUP_SAMPLES:-200}
      DRIFT_WINDOW_SIZE: ${DRIFT_WINDOW_SIZE:-50}
      DRIFT_ALPHA: ${DRIFT_ALPHA:-0.05}
      DRIFT_MIN_FEATURES_FOR_INCIDENT: ${DRIFT_MIN_FEATURES_FOR_INCIDENT:-2}
      DRIFT_USE_LIVE_BASELINE: ${DRIFT_USE_LIVE_BASELINE:-true}
      DRIFT_HEALTH_PORT: "8094"
      DRIFT_METRICS_PORT: "8095"
      DRIFT_REPORTS_DIR: /app/drift-monitor/reports
      DRIFT_EVIDENTLY_EVERY_N_WINDOWS: ${DRIFT_EVIDENTLY_EVERY_N_WINDOWS:-30}
      DRIFT_REPORTS_MAX_FILES: ${DRIFT_REPORTS_MAX_FILES:-48}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ARGUS_AVRO_SCHEMA_PATH: /app/shared/avro/telemetry_event.avsc
    ports:
      - "8094:8094"
      - "8095:8095"
    volumes:
      - drift-reports-data:/app/drift-monitor/reports
    depends_on:
      redpanda:
        condition: service_healthy
      stream-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8094/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      # Live baseline needs DRIFT_BASELINE_SAMPLES validated events (~20s at 10/s).
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 7 — incident-engine (Go: OPA policies + per-vehicle circuit breaker)
  # ---------------------------------------------------------------------------
  incident-engine:
    build:
      context: ./incident-engine
      dockerfile: Dockerfile
    container_name: argus-incident-engine
    environment:
      INCIDENT_ENGINE_ADDR: ":8098"
      KAFKA_BROKERS: redpanda:9092
      INCIDENT_ENGINE_KAFKA_GROUP_ID: ${INCIDENT_ENGINE_KAFKA_GROUP_ID:-argus-incident-engine}
      QA_METRICS_TOPIC: ${QA_METRICS_TOPIC:-telemetry.qa_metrics}
      INCIDENTS_RAW_TOPIC: ${INCIDENTS_RAW_TOPIC:-incidents.raw}
      INCIDENTS_ESCALATED_TOPIC: ${INCIDENTS_ESCALATED_TOPIC:-incidents.escalated}
      INCIDENT_POLICY_DIR: /etc/argus/policies
      INCIDENT_QA_WINDOW_BATCHES: ${INCIDENT_QA_WINDOW_BATCHES:-5}
      INCIDENT_QA_RATE_THRESHOLD: ${INCIDENT_QA_RATE_THRESHOLD:-0.15}
      INCIDENT_DRIFT_MIN_FEATURES: ${INCIDENT_DRIFT_MIN_FEATURES:-2}
      INCIDENT_CONSECUTIVE_FAILURES: ${INCIDENT_CONSECUTIVE_FAILURES:-3}
      INCIDENT_OPEN_COOLDOWN_SEC: ${INCIDENT_OPEN_COOLDOWN_SEC:-60}
      INCIDENT_SLACK_WEBHOOK_URL: ${INCIDENT_SLACK_WEBHOOK_URL:-}
      INCIDENT_PAGERDUTY_WEBHOOK_URL: ${INCIDENT_PAGERDUTY_WEBHOOK_URL:-}
      INCIDENT_ENABLE_MOCK_WEBHOOK: ${INCIDENT_ENABLE_MOCK_WEBHOOK:-true}
      INCIDENT_SLACK_CHANNEL: ${INCIDENT_SLACK_CHANNEL:-#argus-alerts}
      INCIDENT_PAGERDUTY_ROUTING_KEY: ${INCIDENT_PAGERDUTY_ROUTING_KEY:-argus-production}
    ports:
      - "8098:8098"
    depends_on:
      redpanda:
        condition: service_healthy
      stream-processor:
        condition: service_healthy
      drift-monitor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/incident-engine", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 9 — api-gateway (gRPC + REST, OIDC/Keycloak, OPA, rate limits)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.5
    container_name: argus-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8085:8080"
    volumes:
      - ./api-gateway/keycloak/argus-realm.json:/opt/keycloak/data/import/argus-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: argus-api-gateway
    environment:
      API_GATEWAY_ADDR: ":8099"
      API_GATEWAY_GRPC_ADDR: ":9099"
      API_GATEWAY_AUTH_DISABLED: ${API_GATEWAY_AUTH_DISABLED:-false}
      # Issuer must match the JWT `iss` claim from host token requests (localhost:8085).
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://localhost:8085/realms/argus}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-argus-gateway}
      # JWKS is fetched from inside the compose network.
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-http://keycloak:8080/realms/argus/protocol/openid-connect/certs}
      API_GATEWAY_POLICY_DIR: /etc/argus/policies
      API_GATEWAY_OPENAPI_PATH: /etc/argus/openapi/gateway.swagger.json
      INCIDENT_ENGINE_URL: http://incident-engine:8098
      TRINO_URL: http://trino:8080
      TRINO_USER: argus
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: fleet
      DAGSTER_GRAPHQL_URL: http://dagster-webserver:3000/graphql
      DAGSTER_LOCATION_NAME: ${DAGSTER_LOCATION_NAME:-argus_orchestration.definitions}
      DAGSTER_REPOSITORY_NAME: ${DAGSTER_REPOSITORY_NAME:-__repository__}
      DAGSTER_JOB_NAME: ${DAGSTER_JOB_NAME:-drift_retrain_job}
      KAFKA_BROKERS: redpanda:9092
      QA_VALIDATED_TOPIC: ${QA_VALIDATED_TOPIC:-telemetry.validated}
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      API_GATEWAY_RATE_LIMIT_RPS: ${API_GATEWAY_RATE_LIMIT_RPS:-20}
      API_GATEWAY_RATE_LIMIT_BURST: ${API_GATEWAY_RATE_LIMIT_BURST:-40}
      API_GATEWAY_API_KEYS: ${API_GATEWAY_API_KEYS:-demo-viewer:viewer,demo-operator:operator,demo-admin:admin}
      AI_COPILOT_URL: ${AI_COPILOT_URL:-http://ai-copilot:8090}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: api-gateway
    ports:
      - "8099:8099"
      - "9099:9099"
    depends_on:
      keycloak:
        condition: service_healthy
      otel-collector:
        condition: service_started
      incident-engine:
        condition: service_started
      trino:
        condition: service_started
      dagster-webserver:
        condition: service_started
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/api-gateway", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 8 — observability (Prometheus, Grafana, Loki, Jaeger, Alertmanager)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: argus-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      alertmanager:
        condition: service_started
      incident-engine:
        condition: service_started
      stream-processor:
        condition: service_started
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: argus-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    depends_on:
      oncall-reporter:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: argus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-argus}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/fleet-ingestion-overview.json
    ports:
      - "3001:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      jaeger:
        condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: argus-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: argus-promtail
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: argus-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      # Keep host OTLP on the collector (4317/4318); Jaeger OTLP is internal-only.
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: argus-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/otel/otel-collector-config.yml:/etc/otelcol/config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  oncall-reporter:
    build:
      context: ./observability/oncall
      dockerfile: Dockerfile
    container_name: argus-oncall-reporter
    environment:
      ONCALL_ADDR: "0.0.0.0:8100"
      PROMETHEUS_URL: http://prometheus:9090
      INCIDENT_MOCK_INBOX_URL: http://incident-engine:8098/webhooks/mock/inbox
    ports:
      - "8100:8100"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 10 — dashboard (Next.js operator UI)
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        ARGUS_GATEWAY_URL: http://api-gateway:8099
        KEYCLOAK_ISSUER: http://localhost:8085/realms/argus
        NEXTAUTH_URL: http://localhost:3002
    container_name: argus-dashboard
    # Values come from the project-root `.env` (Compose auto-loads it for ${…}
    # substitution). See `.env.example` Phase 10 — generate NEXTAUTH_SECRET with
    # `openssl rand -base64 32`.
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL in .env}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env \(openssl rand -base64 32\)}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8085/realms/argus}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-argus-dashboard}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-argus-dashboard-secret}
      ARGUS_GATEWAY_URL: http://api-gateway:8099
      PROMETHEUS_URL: http://prometheus:9090
      DAGSTER_GRAPHQL_URL: http://dagster-webserver:3000/graphql
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AUTH_DEMO_OFFLINE: ${AUTH_DEMO_OFFLINE:-true}
    ports:
      - "3002:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 13 — ai-copilot (RAG + tool-calling) + Qdrant
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: argus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ai-copilot:
    build:
      context: ./ai-copilot
      dockerfile: Dockerfile
    container_name: argus-ai-copilot
    environment:
      COPILOT_ADDR: ":8090"
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      QDRANT_URL: http://qdrant:6333
      INCIDENT_ENGINE_URL: http://incident-engine:8098
      DRIFT_MONITOR_URL: http://drift-monitor:8094
      ARGUS_GATEWAY_URL: http://api-gateway:8099
      ARGUS_API_KEY: ${ARGUS_API_KEY:-demo-viewer}
      DRIFT_REPORTS_DIR: /reports
      COPILOT_MAX_TOOL_DEPTH: ${COPILOT_MAX_TOOL_DEPTH:-6}
    ports:
      - "8090:8090"
    volumes:
      - drift-reports-data:/reports:ro
    depends_on:
      qdrant:
        condition: service_healthy
      incident-engine:
        condition: service_started
      drift-monitor:
        condition: service_started
      api-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase — dashboard (placeholder removed — see Phase 10 above)
  # ---------------------------------------------------------------------------

volumes:
  redpanda-data:
  minio-data:
  postgres-mlops-data:
  mlflow-artifacts:
  dagster-storage:
  orchestration-artifacts:
  drift-reports-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  loki-data:
  promtail-positions:
  qdrant-data:
