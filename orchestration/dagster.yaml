# Keep instance config minimal — Dagster defaults for compute_logs and
# local_artifact_storage live under $DAGSTER_HOME. Explicit ConfigurableClass
# blocks are only needed for non-default storage backends.
storage:
  sqlite:
    base_dir: /opt/dagster/storage

telemetry:
  enabled: false

scheduler:
  module: dagster.core.scheduler
  class: DagsterDaemonScheduler

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher
