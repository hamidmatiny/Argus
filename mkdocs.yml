site_name: ARGUS Docs
site_description: Fleet telemetry, data quality, MLOps, and ops observability platform
site_url: https://hamidmatiny.github.io/Argus/
repo_url: https://github.com/hamidmatiny/Argus
repo_name: hamidmatiny/Argus
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

exclude_docs: |
  README.md
  assets/screenshots/README.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Demo Script: DEMO_SCRIPT.md
  - Case Study: CASE_STUDY.md
  - Known Gaps: KNOWN_GAPS.md
  - Components:
      - Overview: components/index.md
      - shared: components/shared.md
      - ingestion: components/ingestion.md
      - stream-processor: components/stream-processor.md
      - drift-monitor: components/drift-monitor.md
      - lakehouse: components/lakehouse.md
      - orchestration: components/orchestration.md
      - simulation: components/simulation.md
      - incident-engine: components/incident-engine.md
      - api-gateway: components/api-gateway.md
      - observability: components/observability.md
      - dashboard: components/dashboard.md
      - ai-copilot: components/ai-copilot.md
      - SDKs & CLI: components/sdk-cli.md
      - infra: components/infra.md
  - ADRs:
      - Overview: adr/index.md
      - "001 Kafka / Redpanda": adr/001-kafka-redpanda.md
      - "002 Iceberg lakehouse": adr/002-iceberg-lakehouse.md
      - "003 Dagster vs Airflow": adr/003-dagster-vs-airflow.md
      - "004 OPA policy engine": adr/004-opa-policy-engine.md
      - "005 Read-only AI copilot": adr/005-read-only-ai-copilot.md
      - "006 Local/prod parity": adr/006-local-prod-parity.md
      - "007 Serverless ETL alongside Kafka": adr/007-serverless-etl-alongside-kafka.md
  - Operations Runbook: operations-runbook.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hamidmatiny/Argus
