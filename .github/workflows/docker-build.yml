# Build every service image + smoke (HTTP health or process-alive for consumers).
name: Docker Build

on:
  push:
    branches: [main, master]
    paths:
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"
      - ".trivyignore"
      - "ingestion/**"
      - "stream-processor/**"
      - "drift-monitor/**"
      - "lakehouse/**"
      - "orchestration/**"
      - "incident-engine/**"
      - "api-gateway/**"
      - "dashboard/**"
      - "ai-copilot/**"
      - "observability/oncall/**"
      - "sdk/typescript/**"
      - "shared/**"
  pull_request:
    branches: [main, master]
    paths:
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"
      - ".trivyignore"
      - "ingestion/**"
      - "stream-processor/**"
      - "drift-monitor/**"
      - "lakehouse/**"
      - "orchestration/**"
      - "incident-engine/**"
      - "api-gateway/**"
      - "dashboard/**"
      - "ai-copilot/**"
      - "observability/oncall/**"
      - "sdk/typescript/**"
      - "shared/**"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build · ${{ matrix.name }}
    runs-on: ubuntu-latest
    outputs:
      done: ${{ steps.meta.outputs.done }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # smoke=process: Kafka/MinIO consumers — assert process stays up (no broker in this job).
          # smoke=http: long-running HTTP servers — curl the health path.
          - name: simulator
            context: .
            file: ingestion/simulator/Dockerfile
            tag: argus-simulator:ci
            port: "8091"
            health: /health
            env: ""
            smoke: process
          - name: ray-consumer
            context: .
            file: ingestion/ray_consumer/Dockerfile
            tag: argus-ray-consumer:ci
            port: "8092"
            health: /health
            env: "-e KAFKA_BROKERS=127.0.0.1:9092"
            smoke: process
          - name: stream-processor
            context: .
            file: stream-processor/Dockerfile
            tag: argus-stream-processor:ci
            port: "8093"
            health: /health
            env: "-e KAFKA_BROKERS=127.0.0.1:9092 -e SCHEMA_REGISTRY_URL=http://127.0.0.1:18081"
            smoke: http
          - name: drift-monitor
            context: .
            file: drift-monitor/Dockerfile
            tag: argus-drift-monitor:ci
            port: "8094"
            health: /health
            env: "-e KAFKA_BROKERS=127.0.0.1:9092"
            smoke: process
          - name: lakehouse
            context: .
            file: lakehouse/Dockerfile
            tag: argus-lakehouse:ci
            port: "8096"
            health: /health
            env: "-e LAKEHOUSE_MODE=writer"
            smoke: process
          - name: orchestration
            context: .
            file: orchestration/Dockerfile
            tag: argus-orchestration:ci
            port: "3000"
            health: /server_info
            env: ""
            smoke: http
          - name: incident-engine
            context: ./incident-engine
            file: incident-engine/Dockerfile
            tag: argus-incident-engine:ci
            port: "8098"
            health: /health
            env: "-e KAFKA_BROKERS=127.0.0.1:9092"
            smoke: http
          - name: api-gateway
            context: .
            file: api-gateway/Dockerfile
            tag: argus-api-gateway:ci
            port: "8099"
            health: /health
            env: "-e API_GATEWAY_AUTH_DISABLED=true"
            smoke: http
          - name: oncall-reporter
            context: ./observability/oncall
            file: observability/oncall/Dockerfile
            tag: argus-oncall:ci
            port: "8100"
            health: /health
            env: ""
            smoke: http
          - name: dashboard
            context: .
            file: dashboard/Dockerfile
            tag: argus-dashboard:ci
            port: "3000"
            health: /login
            env: "-e NEXTAUTH_SECRET=ci-build-secret -e NEXTAUTH_URL=http://localhost:3000 -e AUTH_DEMO_OFFLINE=true -e ARGUS_GATEWAY_URL=http://127.0.0.1:8099"
            smoke: http
          - name: ai-copilot
            context: ./ai-copilot
            file: ai-copilot/Dockerfile
            tag: argus-ai-copilot:ci
            port: "8090"
            health: /health
            env: "-e LLM_PROVIDER=mock -e EMBEDDING_PROVIDER=hash -e QDRANT_URL=http://127.0.0.1:6333"
            smoke: http

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t "${{ matrix.tag }}" -f "${{ matrix.file }}" "${{ matrix.context }}"

      - name: Smoke
        run: |
          set -euo pipefail
          NAME="smoke-${{ matrix.name }}"
          MODE="${{ matrix.smoke }}"
          docker rm -f "$NAME" >/dev/null 2>&1 || true
          # shellcheck disable=SC2086
          docker run -d --name "$NAME" -p "${{ matrix.port }}:${{ matrix.port }}" ${{ matrix.env }} "${{ matrix.tag }}"

          if [[ "$MODE" == "process" ]]; then
            # Consumer / producer workers: no Kafka/MinIO in this job. Soft-fail
            # connect loops keep the process alive; fail only on immediate crash.
            sleep 8
            status="$(docker inspect -f '{{.State.Status}}' "$NAME")"
            exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$NAME")"
            echo "status=${status} exit_code=${exit_code}"
            if [[ "$status" == "running" ]]; then
              echo "process_alive_ok"
              docker logs "$NAME" 2>&1 | tail -n 40 || true
              docker rm -f "$NAME"
              exit 0
            fi
            echo "=== container exited unexpectedly ==="
            docker logs "$NAME" || true
            docker rm -f "$NAME" || true
            exit 1
          fi

          # HTTP servers: require a successful health/login response.
          for i in $(seq 1 40); do
            if curl -sf "http://127.0.0.1:${{ matrix.port }}${{ matrix.health }}" >/dev/null; then
              echo "healthy after ${i} attempts"
              curl -sf "http://127.0.0.1:${{ matrix.port }}${{ matrix.health }}" | head -c 300 || true
              echo
              docker rm -f "$NAME"
              exit 0
            fi
            # Fail fast if the process crashed (don't burn the full timeout).
            status="$(docker inspect -f '{{.State.Status}}' "$NAME" 2>/dev/null || echo missing)"
            if [[ "$status" != "running" ]]; then
              echo "container not running (status=${status}) while waiting for health"
              docker logs "$NAME" || true
              docker rm -f "$NAME" || true
              exit 1
            fi
            sleep 2
          done
          echo "=== container logs ==="
          docker logs "$NAME" || true
          docker rm -f "$NAME" || true
          exit 1

      - name: Save image
        run: |
          mkdir -p /tmp/images
          docker save "${{ matrix.tag }}" -o "/tmp/images/${{ matrix.name }}.tar"

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp/images/${{ matrix.name }}.tar
          retention-days: 1

      - id: meta
        run: echo "done=1" >> "$GITHUB_OUTPUT"

  trivy:
    name: Trivy · ${{ matrix.name }}
    needs: docker-build
    # Only run when every build matrix cell succeeded (avoids skipped Trivy/SBOM).
    if: ${{ !cancelled() && needs.docker-build.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: simulator
            tag: argus-simulator:ci
          - name: ray-consumer
            tag: argus-ray-consumer:ci
          - name: stream-processor
            tag: argus-stream-processor:ci
          - name: drift-monitor
            tag: argus-drift-monitor:ci
          - name: lakehouse
            tag: argus-lakehouse:ci
          - name: orchestration
            tag: argus-orchestration:ci
          - name: incident-engine
            tag: argus-incident-engine:ci
          - name: api-gateway
            tag: argus-api-gateway:ci
          - name: oncall-reporter
            tag: argus-oncall:ci
          - name: dashboard
            tag: argus-dashboard:ci
          - name: ai-copilot
            tag: argus-ai-copilot:ci
    steps:
      - uses: actions/checkout@v4
        # Required so trivyignores: .trivyignore is available on the runner.

      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp/images

      - name: Load image
        run: docker load -i "/tmp/images/${{ matrix.name }}.tar"

      - name: Trivy scan (fail on HIGH/CRITICAL)
        # Tag must include the leading "v" (0.28.0 does not resolve on the marketplace).
        # .trivyignore documents transitive Ray/MLflow/sharp/pip CVEs we cannot
        # patch in-tree yet; Go images are rebuilt on golang:1.24 to clear stdlib.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.tag }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

  sbom:
    name: SBOM · ${{ matrix.name }}
    needs: docker-build
    if: ${{ !cancelled() && needs.docker-build.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cap parallelism so 11 jobs don't stampede GitHub's release CDN at once
      # (anchore/sbom-action's install.sh fails hard on transient 302/504).
      max-parallel: 4
      matrix:
        include:
          - name: simulator
            tag: argus-simulator:ci
          - name: ray-consumer
            tag: argus-ray-consumer:ci
          - name: stream-processor
            tag: argus-stream-processor:ci
          - name: drift-monitor
            tag: argus-drift-monitor:ci
          - name: lakehouse
            tag: argus-lakehouse:ci
          - name: orchestration
            tag: argus-orchestration:ci
          - name: incident-engine
            tag: argus-incident-engine:ci
          - name: api-gateway
            tag: argus-api-gateway:ci
          - name: oncall-reporter
            tag: argus-oncall:ci
          - name: dashboard
            tag: argus-dashboard:ci
          - name: ai-copilot
            tag: argus-ai-copilot:ci
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp/images

      - name: Load image
        run: docker load -i "/tmp/images/${{ matrix.name }}.tar"

      # Bypass anchore/sbom-action's install.sh (no retries; treats transient CDN
      # 302/504 as fatal). Pin + retry a direct tarball install, then scan.
      - name: Install syft
        env:
          SYFT_VERSION: "1.42.3"
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/syft"
          mkdir -p "$install_dir"
          url="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          ok=0
          for attempt in 1 2 3 4 5; do
            echo "syft install attempt ${attempt}"
            if curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors "$url" \
              | tar -xz -C "$install_dir" syft; then
              ok=1
              break
            fi
            sleep $((attempt * 5))
          done
          [[ "$ok" -eq 1 ]] || { echo "syft install failed after retries"; exit 1; }
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/syft" version

      - name: Generate SBOM (syft)
        run: |
          set -euo pipefail
          syft scan "${{ matrix.tag }}" -o "spdx-json=sbom-${{ matrix.name }}.spdx.json"
          test -s "sbom-${{ matrix.name }}.spdx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          retention-days: 30
